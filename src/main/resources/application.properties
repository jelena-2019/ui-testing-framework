# Application Configuration Properties

# Base URL
old.url=https://with-bugs.practicesoftwaretesting.com/#/
base.url=https://practicesoftwaretesting.com

# Browser Configuration
browser=chrome
headless.mode=false

# Timeouts (in seconds)
implicit.wait=10
explicit.wait=30
page.load.timeout=20

# Screenshot and Logging Configuration
screenshot.on.failure=true
logs.path=logs/
screenshots.path=screenshots/
testdata.path=src/test/resources/testdata/

# Test Data - Valid Credentials
valid.username=customer@practicesoftwaretesting.com
valid.password=welcome01

# Test Data - Invalid Credentials
invalid.username=invalid@example.com
invalid.password=wrongpassword

# Report Configuration
report.path=test-output/
